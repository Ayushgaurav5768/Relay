# =============================================================================
# Relay — Nginx Production Configuration
# =============================================================================
# TLS termination, static file serving, API reverse proxy.
# For local demo: self-signed cert generated by deploy.sh.
# For production: replace with Let's Encrypt or your CA-signed cert.
# =============================================================================

upstream ingest_api {
    server ingest:3001;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # ── React SPA ───────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy (strip /api prefix) ───────────────────────────
    location /api/ {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://ingest_api;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout                  30s;
        proxy_connect_timeout               10s;
    }

    # ── Metrics (exposed via ingest) ────────────────────────────
    location /metrics {
        proxy_pass http://ingest_api/metrics;
        proxy_set_header Host $host;
    }
}
