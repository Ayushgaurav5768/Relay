global:
  scrape_interval: 5s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'ingest'
    static_configs:
      - targets: ['ingest:3001']
        labels:
          service: ingest

  - job_name: 'delivery-worker'
    static_configs:
      - targets: ['delivery-worker:3002']
        labels:
          service: delivery-worker

  - job_name: 'dashboard-api'
    static_configs:
      - targets: ['dashboard-api:3003']
        labels:
          service: dashboard-api

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
