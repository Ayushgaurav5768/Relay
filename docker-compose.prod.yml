# =============================================================================
# Relay — Production Deployment
# =============================================================================
# Usage:
#   cp .env.example .env.production    # edit secrets
#   bash infra/scripts/deploy.sh production
#
# Images are pulled from GHCR (built & pushed by CI on merge to main).
# TLS: self-signed certs generated on first deploy (local demo).
# For production, replace infra/nginx/certs/ with CA-signed certs.
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &restart-policy
  restart: unless-stopped

services:

  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: *restart-policy
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${PGDATABASE:-relay}
      POSTGRES_USER: ${PGUSER:-relay}
      POSTGRES_PASSWORD: ${PGPASSWORD:?PGPASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-relay}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: *restart-policy
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging

  # ── RabbitMQ ─────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    <<: *restart-policy
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-relay}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Ingest Service ────────────────────────────────────────────
  ingest:
    image: ${IMAGE_NAMESPACE:-ghcr.io/ayushgaurav5768/relay}/ingest:${IMAGE_TAG:-latest}
    <<: *restart-policy
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      INGEST_PORT: 3001
      PGUSER: ${PGUSER:-relay}
      PGPASSWORD: ${PGPASSWORD:?PGPASSWORD is required}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-relay}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-relay}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      INGEST_HMAC_SECRET: ${INGEST_HMAC_SECRET:?INGEST_HMAC_SECRET is required}
      INGEST_API_KEYS: ${INGEST_API_KEYS:?INGEST_API_KEYS is required}
      INGEST_RATE_LIMIT_RATE: ${INGEST_RATE_LIMIT_RATE:-100}
      INGEST_RATE_LIMIT_INTERVAL_MS: ${INGEST_RATE_LIMIT_INTERVAL_MS:-1000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    logging: *default-logging

  # ── Delivery Worker ──────────────────────────────────────────
  delivery-worker:
    image: ${IMAGE_NAMESPACE:-ghcr.io/ayushgaurav5768/relay}/delivery-worker:${IMAGE_TAG:-latest}
    <<: *restart-policy
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      DELIVERY_WORKER_PORT: 3002
      PGUSER: ${PGUSER:-relay}
      PGPASSWORD: ${PGPASSWORD:?PGPASSWORD is required}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-relay}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-relay}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      DELIVERY_HMAC_SECRET: ${DELIVERY_HMAC_SECRET:?DELIVERY_HMAC_SECRET is required}
      DELIVERY_CONCURRENCY: ${DELIVERY_CONCURRENCY:-5}
      MAX_RETRIES: ${MAX_RETRIES:-5}
      CB_FAILURE_THRESHOLD: ${CB_FAILURE_THRESHOLD:-5}
      CB_COOLDOWN_SECONDS: ${CB_COOLDOWN_SECONDS:-30}
      CB_HALF_OPEN_SUCCESS_THRESHOLD: ${CB_HALF_OPEN_SUCCESS_THRESHOLD:-2}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    logging: *default-logging

  # ── Dashboard API (internal BFF) ────────────────────────────
  dashboard-api:
    image: ${IMAGE_NAMESPACE:-ghcr.io/ayushgaurav5768/relay}/dashboard-api:${IMAGE_TAG:-latest}
    <<: *restart-policy
    environment:
      DASHBOARD_PORT: 3003
      PGUSER: ${PGUSER:-relay}
      PGPASSWORD: ${PGPASSWORD:?PGPASSWORD is required}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-relay}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-relay}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  # ── Client Builder (run-once: builds React static files) ─────
  client:
    build:
      context: .
      dockerfile: services/client/Dockerfile.prod
    volumes:
      - client-dist:/app/services/client/dist
    logging: *default-logging

  # ── Nginx (TLS termination, static serving, API proxy) ──────
  nginx:
    image: nginx:alpine
    <<: *restart-policy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
      - client-dist:/usr/share/nginx/html:ro
    depends_on:
      client:
        condition: service_completed_successfully
      ingest:
        condition: service_started
    logging: *default-logging

volumes:
  pgdata:
  redis-data:
  rabbitmq-data:
  client-dist:
